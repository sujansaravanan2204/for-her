<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: white;
      overflow-x: hidden;
    }

    /* 🌙 Glow text */
    h1, h2 {
      color: #ff4d6d;
      text-shadow: 0 0 15px rgba(255,77,109,0.8);
    }

    /* 🎬 Sections */
    section {
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transform: translateY(40px);
      transition: all 1.2s ease;
    }

    section.show {
      opacity: 1;
      transform: translateY(0);
      backdrop-filter: blur(6px);
    }

    /* 🎬 Background blending */
    section:nth-child(odd) {
      background: linear-gradient(to bottom, #0f0f0f, #1a1a1a);
    }

    section:nth-child(even) {
      background: linear-gradient(to bottom, #1a1a1a, #0f0f0f);
    }

    p {
      max-width: 600px;
      text-align: center;
      font-size: 18px;
      line-height: 1.8;
    }

    button {
      padding: 12px 25px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }

    /* 📸 Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      max-width: 500px;
    }

    .gallery img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
    }

    /* 💖 Hearts */
    .heart {
      position: fixed;
      bottom: -10px;
      color: #ff4d6d;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }

    /* 🎥 Video */
    #videoPopup {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    video {
      width: 80%;
      max-width: 500px;
    }

    /* 🔐 Password */
    #lockScreen, #startScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
    }

    #lockScreen {
      display: none;
    }

  </style>
</head>

<body>

<!-- 🎬 START -->
<div id="startScreen">
  <h1>Hey… ❤️</h1>
  <button onclick="startExperience()">Click this…</button>
</div>

<!-- 🔐 PASSWORD -->
<div id="lockScreen">
  <h2>Enter Password ❤️</h2>
  <input type="password" id="passwordInput">
  <button onclick="checkPassword()">Enter</button>
</div>

<!-- 🎬 CONTENT -->
<div id="mainContent" style="display:none;">

<section>
  <h1>OOIII KUTTII ma ❤️</h1>
  <p id="typing"></p>
</section>

<section>
  <div class="gallery">
    <img src="photo2.jpg.jpeg">
    <img src="photo3.jpg.jpeg">
    <img src="photo4.jpg.jpeg">
    <img src="photo1.jpg.jpeg">
  </div>
</section>

<section>
  <button onclick="showMessage()">Click this…</button>
  <p id="secret"></p>
</section>

<section>
  <button onclick="openVideo()">Watch this 🎥</button>
</section>

<section>
  <h2>One last thing… ❤️</h2>
  <button onclick="showFinalLove()">Click this kuttima… 💖</button>
  <p id="finalMessage"></p>
</section>

</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- 🎥 VIDEO -->
<div id="videoPopup" onclick="closeVideo()">
  <video controls>
    <source src="video.mp4">
  </video>
</div>

<script>

/* 🎬 START FLOW */
function startExperience() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("lockScreen").style.display = "flex";
  document.getElementById("bgMusic").play();
}

/* 🔐 PASSWORD */
function checkPassword() {
  if(document.getElementById("passwordInput").value === "kuttima") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } else {
    alert("Think again kutti ❤️");
  }
}

/* 🎬 SCROLL */
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    if(sec.getBoundingClientRect().top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});

/* ✨ SLOW TYPING (READABLE) */
const text = "I know things felt a little off yesterday…\n\nI’ve been thinking about it a lot.\n\nIf I hurt you in any way… I’m really sorry.\n\nYou mean a lot to me, Vidhu ma…\n\nMore than anything.\n\nAnd no matter what happens…\n\nI’ll always choose you.";

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 60); // 🔥 slower typing
  }
}
typeWriter();

/* ❤️ MESSAGE */
function showMessage() {
  document.getElementById("secret").innerText =
  "No matter what happens, I choose you ❤️";
}

/* 💖 HEARTS */
setInterval(() => {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤️";
  h.style.left = Math.random()*100+"vw";
  h.style.fontSize = (10 + Math.random()*20)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

/* 🎥 VIDEO */
function openVideo() {
  document.getElementById("videoPopup").style.display = "flex";
}
function closeVideo() {
  document.getElementById("videoPopup").style.display = "none";
}

/* 💌 FINAL */
function showFinalLove() {
  document.getElementById("finalMessage").innerText =
  "Kovam koranjiruchaa kuttimaaaa… ❤️";
}

</script>

</body>
</html>
