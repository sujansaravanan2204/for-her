<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: white;
      overflow-x: hidden;
    }

    section {
  min-height: auto;   /* 🔥 FIXED */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px 20px;  /* controlled spacing */
  margin: 20px 0;      /* small gap between sections */
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

    section.show {
      opacity: 1;
      transform: translateY(0);
    }

    h1, h2 {
      color: #ff4d6d;
    }

    p {
      max-width: 600px;
      text-align: center;
      line-height: 1.6;
      font-size: 18px;
    }

    button {
      padding: 12px 25px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 20px;
      cursor: pointer;
    }

    /* 📸 Cinematic Photos */
    .hero-img {
      width: 90%;
      max-width: 400px;
      border-radius: 15px;
      margin: 20px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      max-width: 500px;
    }

    .gallery img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
    }

    /* 💖 Hearts */
    .heart {
      position: fixed;
      bottom: -10px;
      color: #ff4d6d;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }

    /* 🎥 Video */
    #videoPopup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    video {
      width: 80%;
      max-width: 500px;
    }

  </style>
</head>

<body>

<!-- 🎬 SECTION 1 -->
<section>
  <h1>OOIII KUTTII ma ❤️</h1>
  <p id="typing"></p>
</section>

<!-- 🎬 SECTION 2 -->

<!-- 🎬 SECTION 3 -->
<section>
  <div class="gallery">
    <img src="photo2.jpg.jpeg">
    <img src="photo3.jpg.jpeg">
    <img src="photo4.jpg.jpeg">
    <img src="photo1.jpg.jpeg">
  </div>
</section>

<!-- 🎬 SECTION 4 -->
<section>
  <button onclick="showMessage()">Click this…</button>
  <p id="secret"></p>
</section>

<!-- 🎬 SECTION 5 -->
<section>
  <button onclick="openVideo()">Watch this 🎥</button>
</section>

<!-- 🎬 FINAL -->
<section>
  <h2>One last thing… ❤️</h2>
  <button onclick="showFinalLove()">Click this kuttima… 💖</button>
  <p id="finalMessage"></p>
</section>

<!-- 🎵 Music -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- 🎥 Video -->
<div id="videoPopup" onclick="closeVideo()">
  <video controls>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<script>

/* 🎬 Scroll Animation */
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});

/* 🎵 Start music */
document.addEventListener("click", () => {
  document.getElementById("bgMusic").play();
}, { once: true });

/* ✨ Typing */
const text = "I know things felt a little off yesterday… and I’ve been thinking about it a lot.\n\nIf I hurt you in any way… I’m really sorry.\n\nYou mean a lot to me, Vidhu ma… more than anything.\n\nI’ll always choose you.";

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}
typeWriter();

/* ❤️ Message */
function showMessage() {
  document.getElementById("secret").innerText =
  "No matter what happens, I choose you. Always. ❤️";
}

/* 💖 Hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

/* 🎥 Video */
function openVideo() {
  document.getElementById("videoPopup").style.display = "flex";
}
function closeVideo() {
  document.getElementById("videoPopup").style.display = "none";
}

/* 💌 Final */
function showFinalLove() {
  document.getElementById("finalMessage").innerText =
  "Hope this makes you happy vidhu maaa ❤️";
}

</script>

</body>
</html>
