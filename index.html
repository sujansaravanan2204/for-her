<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: white;
      overflow-x: hidden;
    }

    h1, h2 {
      color: #ff4d6d;
      text-shadow: 0 0 15px rgba(255,77,109,0.8);
    }

    section {
      padding: 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transform: translateY(40px);
      transition: all 1.2s ease;
    }

    section.show {
      opacity: 1;
      transform: translateY(0);
      backdrop-filter: blur(6px);
    }

    section:nth-child(odd) {
      background: linear-gradient(to bottom, #0f0f0f, #1a1a1a);
    }

    section:nth-child(even) {
      background: linear-gradient(to bottom, #1a1a1a, #0f0f0f);
    }

    p {
      max-width: 600px;
      text-align: center;
      font-size: 18px;
      line-height: 1.8;
    }

    button {
      padding: 12px 25px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }

    /* 📸 Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      max-width: 500px;
    }

    .gallery img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
    }

    /* 📸 Special Images */
    .extra-img {
      width: 90%;
      max-width: 350px;
      margin-top: 20px;
      border-radius: 12px;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.8s ease;
    }

    .extra-img.show {
      opacity: 1;
      transform: scale(1);
    }

    /* 💖 Hearts */
    .heart {
      position: fixed;
      bottom: -10px;
      color: #ff4d6d;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }

    /* 🔐 Screens */
    #lockScreen, #startScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
    }

    #lockScreen { display: none; }

  </style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <h1>Hey… ❤️</h1>
  <button onclick="startExperience()">Click this…</button>
</div>

<!-- PASSWORD -->
<div id="lockScreen">
  <h2>Enter Password ❤️</h2>
  <input type="password" id="passwordInput">
  <button onclick="checkPassword()">Enter</button>
</div>

<!-- MAIN -->
<div id="mainContent" style="display:none;">

<section>
  <h1>OIII KUTTII ma ❤️</h1>
  <p id="typing"></p>
</section>

<section>
  <div class="gallery">
    <img src="photo2.jpg.jpeg">
    <img src="photo3.jpg.jpeg">
    <img src="photo4.jpg.jpeg">
    <img src="photo1.jpg.jpeg">
  </div>
</section>

<section>
  <button onclick="showMessage()">Click this…</button>
  <p id="secret"></p>
  <img id="photo5" src="photo5.jpg.jpeg" class="extra-img">
</section>

<section>
  <h2>One last thing… ❤️</h2>
  <button onclick="showFinalLove()">Click this kuttima… 💖</button>
  <p id="finalMessage"></p>
  <img id="photo6" src="photo6.jpg.jpeg" class="extra-img">
</section>

</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

/* START */
function startExperience() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("lockScreen").style.display = "flex";
  document.getElementById("bgMusic").play();
}

/* PASSWORD */
function checkPassword() {
  if(document.getElementById("passwordInput").value === "kuttima") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } else {
    alert("Think again kuttimaa ❤️");
  }
}

/* SCROLL */
const sections = document.querySelectorAll("section");
window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    if(sec.getBoundingClientRect().top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});

/* SLOW TYPING */
const text = "I know things felt a little off yesterday…\n\nI’ve been thinking about it a lot.\n\nIf I hurt you… I’m really sorry.\n\nYou mean a lot to me Vidhu ma…\n\nMore than anything.\n\nAnd no matter what happens…\n\nI’ll always choose you.";

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 60);
  }
}
typeWriter();

/* MID */
function showMessage() {
  document.getElementById("secret").innerText =
  "No matter what happens, I choose you ❤️";

  document.getElementById("photo5").classList.add("show");
}

/* FINAL */
function showFinalLove() {
  document.getElementById("finalMessage").innerText =
  "I hope you’re okay now kuttima… don’t tell me not to do all this, I just love making you smile… because I meow you a lottttt kuttimaa 🐾❤️";

  document.getElementById("photo6").classList.add("show");
}

/* HEARTS */
setInterval(() => {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤️";
  h.style.left = Math.random()*100+"vw";
  h.style.fontSize = (10 + Math.random()*20)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

</script>

</body>
</html>
