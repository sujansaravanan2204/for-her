<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #ffe6e6, #fff);
      overflow-x: hidden;
    }

    h1 {
      color: #ff4d6d;
      margin-top: 40px;
    }

    p {
      font-size: 18px;
      max-width: 600px;
      margin: 10px auto;
      line-height: 1.6;
    }

    img {
      width: 200px;
      border-radius: 12px;
      margin: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button {
      padding: 12px 25px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }

    /* 💖 Floating Hearts */
    .heart {
      position: fixed;
      bottom: -10px;
      color: #ff4d6d;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<h1>Hey Vidhu ma ❤️</h1>

<p id="typing"></p>

<button onclick="showMessage()">Click this…</button>

<p id="secret" style="font-weight: bold; color:#ff4d6d;"></p>

<h2>Our Memories 📸</h2>

<img src="photo1.jpg.jpeg">
<img src="photo2.jpg.jpeg">
<img src="photo3.jpg.jpeg">
<img src="photo4.jpg.jpeg">

<script>
/* ✨ Typing Effect */
const text = "I know things felt a little off yesterday… and I’ve been thinking about it a lot.\n\nIf I made you feel hurt in any way… I’m really sorry.\n\nYou mean a lot to me, Vidhu ma… more than these small misunderstandings.\n\nI may not always be perfect… but I’ll always choose you.";

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}
typeWriter();

/* ❤️ Button Message */
function showMessage() {
  document.getElementById("secret").innerText =
  "No matter what happens, I choose you. Always. ❤️";
}

/* 💖 Floating Hearts Generator */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
