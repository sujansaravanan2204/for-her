<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <!-- ✅ MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: white;
      overflow-x: hidden;
    }

    h1, h2 {
      color: #ff4d6d;
      text-shadow: 0 0 15px rgba(255,77,109,0.8);
    }

    section {
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s ease;
    }

    section.show {
      opacity: 1;
      transform: translateY(0);
    }

    p {
      max-width: 600px;
      text-align: center;
      font-size: 16px;
      line-height: 1.8;
    }

    button {
      padding: 12px 25px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }

    /* 📸 Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      width: 90%;
      max-width: 500px;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 10px;
    }

    /* 📸 Extra images */
    .extra-img {
      width: 90%;
      max-width: 320px;
      margin-top: 20px;
      border-radius: 12px;
      opacity: 0;
      transform: scale(0.9);
      transition: 0.6s ease;
    }

    .extra-img.show {
      opacity: 1;
      transform: scale(1);
    }

    /* 💖 Hearts */
    .heart {
      position: fixed;
      bottom: -10px;
      color: #ff4d6d;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }

    /* 🎥 VIDEO POPUP (FIXED) */
    #videoPopup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.95);
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    video {
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
    }

    /* 🔐 Screens */
    #startScreen, #lockScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 1000;
    }

    #lockScreen {
      display: none;
    }

  </style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <h1>Hey… ❤️</h1>
  <button onclick="startExperience()">Click this…</button>
</div>

<!-- PASSWORD -->
<div id="lockScreen">
  <h2>Enter Password ❤️</h2>
  <input type="password" id="passwordInput">
  <button onclick="checkPassword()">Enter</button>
</div>

<!-- MAIN -->
<div id="mainContent" style="display:none;">

<section>
  <h1>OIII KUTTII ma ❤️</h1>
  <p id="typing"></p>
</section>

<section>
  <div class="gallery">
    <img src="photo1.jpg.jpeg">
    <img src="photo2.jpg.jpeg">
    <img src="photo3.jpg.jpeg">
    <img src="photo4.jpg.jpeg">
  </div>
</section>

<section>
  <button onclick="showMessage()">Click this…</button>
  <p id="secret"></p>
  <img id="photo5" src="photo5.jpg.jpeg" class="extra-img">
</section>

<!-- 🎥 VIDEO BUTTON -->
<section>
  <button onclick="openVideo()">Watch this 🎥</button>
</section>

<section>
  <h2>One last thing… ❤️</h2>
  <button onclick="showFinalLove()">Click this kuttima… 💖</button>
  <p id="finalMessage"></p>
  <img id="photo6" src="photo6.jpg.jpeg" class="extra-img">
</section>

</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="song.mp3">
</audio>

<!-- 🎥 VIDEO POPUP -->
<div id="videoPopup">
  <video id="myVideo" controls playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>
  <button onclick="closeVideo()">Close ✖</button>
</div>

<script>

/* START */
function startExperience() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("lockScreen").style.display = "flex";
  document.getElementById("bgMusic").play();
}

/* PASSWORD */
function checkPassword() {
  if(document.getElementById("passwordInput").value === "kuttima") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } else {
    alert("Think again kuttima ❤️");
  }
}

/* SCROLL */
const sections = document.querySelectorAll("section");
window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    if(sec.getBoundingClientRect().top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});

/* TYPING */
const text = "I know things felt a little off yesterday...\n\nI’ve been thinking about it a lot.\n\nIf I hurt you, I’m really sorry.\n\nYou mean a lot to me Vidhu ma...\n\nI’ll always choose you ❤️";

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 50);
  }
}
typeWriter();

/* MID */
function showMessage() {
  document.getElementById("secret").innerText =
  "No matter what happens, I choose you ❤️";

  document.getElementById("photo5").classList.add("show");
}

/* FINAL */
function showFinalLove() {
  document.getElementById("finalMessage").innerText =
  "I hope you're okay now kuttima… I just love making you smile… because I meow you a lottttt ❤️";

  document.getElementById("photo6").classList.add("show");
}

/* 💖 HEARTS */
setInterval(() => {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤️";
  h.style.left = Math.random()*100+"vw";
  h.style.fontSize = (10 + Math.random()*20)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

/* 🎥 VIDEO (FIXED PROPERLY) */
function openVideo() {
  const popup = document.getElementById("videoPopup");
  const video = document.getElementById("myVideo");

  popup.style.display = "flex";

  // 🔥 Important for mobile
  video.load();
}

function closeVideo() {
  const popup = document.getElementById("videoPopup");
  const video = document.getElementById("myVideo");

  popup.style.display = "none";
  video.pause();
  video.currentTime = 0;
}

</script>

</body>
</html>
